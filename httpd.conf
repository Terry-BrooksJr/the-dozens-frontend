# =============================================================================
# httpd.conf - Apache HTTP Server Configuration
# The Dozens Frontend - Static Site
# =============================================================================

# -----------------------------------------------------------------------------
# Core Server Settings
# -----------------------------------------------------------------------------
ServerRoot "/usr/local/apache2"

Listen 80

ServerName localhost

# Suppress Apache version in error pages and response headers
ServerTokens Prod
ServerSignature Off

# -----------------------------------------------------------------------------
# Load Modules
# -----------------------------------------------------------------------------
LoadModule mpm_event_module      modules/mod_mpm_event.so
LoadModule authz_core_module     modules/mod_authz_core.so
LoadModule authz_host_module     modules/mod_authz_host.so
LoadModule access_compat_module  modules/mod_access_compat.so
LoadModule log_config_module     modules/mod_log_config.so
LoadModule env_module            modules/mod_env.so
LoadModule mime_module           modules/mod_mime.so
LoadModule dir_module            modules/mod_dir.so
LoadModule alias_module          modules/mod_alias.so
LoadModule rewrite_module        modules/mod_rewrite.so
LoadModule deflate_module        modules/mod_deflate.so
LoadModule filter_module         modules/mod_filter.so
LoadModule headers_module        modules/mod_headers.so
LoadModule setenvif_module       modules/mod_setenvif.so
LoadModule unixd_module          modules/mod_unixd.so
LoadModule reqtimeout_module     modules/mod_reqtimeout.so

# -----------------------------------------------------------------------------
# User/Group
# -----------------------------------------------------------------------------
User daemon
Group daemon

# -----------------------------------------------------------------------------
# Logging - send to stdout/stderr so Docker captures with `docker logs`
# -----------------------------------------------------------------------------
ErrorLog /proc/self/fd/2
LogLevel warn

LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
CustomLog /proc/self/fd/1 combined

# -----------------------------------------------------------------------------
# Performance & Timeouts
# -----------------------------------------------------------------------------
Timeout 60
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5

# Mitigate slowloris-style attacks
RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500

# -----------------------------------------------------------------------------
# MIME Types
# -----------------------------------------------------------------------------
TypesConfig /usr/local/apache2/conf/mime.types

# Modern font formats
AddType font/woff2              .woff2
AddType font/woff               .woff
AddType font/otf                .otf
AddType font/ttf                .ttf

# Modern image formats
AddType image/webp              .webp
AddType image/svg+xml           .svg

# Video
AddType video/mp4               .mp4

# JavaScript (correct IANA MIME type)
AddType application/javascript  .js

# Favicon
AddType image/x-icon            .ico

# -----------------------------------------------------------------------------
# Document Root
# -----------------------------------------------------------------------------
DocumentRoot "/usr/local/apache2/htdocs"

<Directory />
    AllowOverride None
    Require all denied
</Directory>

<Directory "/usr/local/apache2/htdocs">
    Options -Indexes -Includes +FollowSymLinks
    AllowOverride None
    Require all granted
    DirectoryIndex index.html
</Directory>

# -----------------------------------------------------------------------------
# includes/ directory
# component-loader.js fetches HTML partials from this directory at runtime
# via fetch('./includes/...').  These partials are same-origin resources and
# do not require CORS headers for normal operation.
#
# If you ever need to serve these partials to a *different* origin (e.g. a
# separate staging domain), add an explicit allowlist instead of a wildcard:
#
#   Header set Access-Control-Allow-Origin "https://staging.example.com"
#   Header set Access-Control-Allow-Methods "GET, OPTIONS"
#   Header set Access-Control-Allow-Headers "Content-Type"
# -----------------------------------------------------------------------------
<Directory "/usr/local/apache2/htdocs/includes">
    Options -Indexes -Includes +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# -----------------------------------------------------------------------------
# Custom Error Documents
# -----------------------------------------------------------------------------
ErrorDocument 403 /403.html
ErrorDocument 404 /404.html
ErrorDocument 500 /500.html

# -----------------------------------------------------------------------------
# Compression (mod_deflate)
# Text resources are compressed; binary formats (images, fonts, video) are not.
# -----------------------------------------------------------------------------
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html
    AddOutputFilterByType DEFLATE text/css
    AddOutputFilterByType DEFLATE application/javascript
    AddOutputFilterByType DEFLATE text/javascript
    AddOutputFilterByType DEFLATE text/plain
    AddOutputFilterByType DEFLATE text/xml
    AddOutputFilterByType DEFLATE application/json
    AddOutputFilterByType DEFLATE image/svg+xml

    # Ensure proxies/CDNs cache compressed and uncompressed separately
    Header append Vary Accept-Encoding
</IfModule>

# -----------------------------------------------------------------------------
# Security Headers
# -----------------------------------------------------------------------------
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always unset X-Powered-By
    Header always unset Server
</IfModule>

# -----------------------------------------------------------------------------
# Cache-Control
# HTML: revalidate on every request (API URL may change between deploys)
# CSS/JS/Fonts: aggressive long-term caching
# Images/Video: 30-day caching
# -----------------------------------------------------------------------------
<FilesMatch "\.(html|htm)$">
    Header set Cache-Control "no-cache, must-revalidate"
</FilesMatch>

<FilesMatch "\.(css|js|mjs)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
</FilesMatch>

<FilesMatch "\.(woff|woff2|otf|ttf|eot)$">
    Header set Cache-Control "public, max-age=31536000, immutable"
</FilesMatch>

<FilesMatch "\.(png|jpg|jpeg|gif|ico|svg|webp)$">
    Header set Cache-Control "public, max-age=2592000"
</FilesMatch>

<FilesMatch "\.(mp4|webm|ogg)$">
    Header set Cache-Control "public, max-age=2592000"
</FilesMatch>

# -----------------------------------------------------------------------------
# Deny access to hidden files, editor backups, and sensitive extensions
# -----------------------------------------------------------------------------
<FilesMatch "(^\.|\.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)|~)$">
    Require all denied
</FilesMatch>

# -----------------------------------------------------------------------------
# Disable ETags (Cache-Control is sufficient)
# -----------------------------------------------------------------------------
FileETag None
